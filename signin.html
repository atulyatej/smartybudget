<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6551301135093849"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SmartyBudget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color-light: #f8f9fa;
            --text-color-dark: #212529;
            --bg-color-dark: #121212;
            --text-color-light: #f8f9fa;
            --primary-color: #007bff;
            --secondary-color: #6c757d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color-dark);
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d3436 100%);
            color: var(--text-color-light);
        }

        .navbar {
            background: linear-gradient(135deg, #2d3436, #212f3d);
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
        }

        .navbar-nav .nav-link {
            color: #ffffff !important;
            text-transform: uppercase;
            padding: 10px 20px;
            transition: transform 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            transform: scale(1.1);
            background-color: #1e2a3a;
        }

        .signup-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .dark-mode .signup-container {
            background: rgba(30, 42, 58, 0.95);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .signup-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .signup-header h1 {
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .dark-mode .signup-header h1 {
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .dark-mode .form-control {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-control:focus {
            border-color: #2193b0;
            box-shadow: 0 0 0 4px rgba(33, 147, 176, 0.1);
            transform: translateY(-2px);
        }

        .btn-signup {
            height: 50px;
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .btn-signup:hover::before {
            left: 100%;
        }

        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(33, 147, 176, 0.3);
            background: linear-gradient(135deg, #1c7a94, #5bc1d9);
        }

        .error-message {
            color: #ff4757;
            margin-top: 15px;
            text-align: center;
            display: none;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 71, 87, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .signin-link {
            margin-top: 20px;
            text-align: center;
        }

        .signin-link a {
            color: #2193b0;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .signin-link a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .signin-link a:hover::after {
            transform: scaleX(1);
        }

        .dark-mode-toggle {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50%;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dark-mode-toggle:hover {
            background-color: #2980b9;
            transform: rotate(180deg);
        }

        footer {
            margin-top: auto;
            background: linear-gradient(135deg, #2d3436, #212f3d);
            padding: 20px 0;
        }

        footer a {
            color: #ffffff !important;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        footer a:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        footer a:hover:after {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="index.html">
                <span style="font-weight: 700; font-size: 1.5rem;">Smarty</span>
                <span style="color: #00bcd4; font-weight: 700; font-size: 1.5rem;">Budget</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="features.html">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item">
                        <button class="dark-mode-toggle" id="darkModeToggle">🔳</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sign Up Form -->
    <div class="container">
        <div class="signup-container">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p class="text-muted">Join SmartyBudget to manage your finances better</p>
            </div>
            <form id="signupForm" onsubmit="handleSignUp(event)">
                <div class="mb-4">
                    <input type="text" class="form-control" id="name" placeholder="Full Name" required>
                </div>
                <div class="mb-4">
                    <input type="email" class="form-control" id="email" placeholder="Email address" required>
                </div>
                <div class="mb-4">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                </div>
                <div class="mb-4">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                <div class="mb-4">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone Number" required>
                </div>
                <button type="submit" class="btn btn-signup w-100">Create Account</button>
                <div class="error-message" id="errorMessage"></div>
                <div class="signin-link">
                    <a href="signin.html">Already have an account? Sign in</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-white text-center p-4 mt-5">
        <p>&copy; 2025 SmartyBudget. All Rights Reserved.</p>
        <div>
            <a href="contact.html">Contact Us</a> | 
            <a href="terms.html">Terms & Conditions</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dark mode functionality
        document.addEventListener("DOMContentLoaded", () => {
            const darkModeToggle = document.getElementById("darkModeToggle");
            const body = document.body;

            if (localStorage.getItem("dark-mode") === "enabled") {
                body.classList.add("dark-mode");
                darkModeToggle.textContent = "🔲";
            }

            darkModeToggle.addEventListener("click", () => {
                body.classList.toggle("dark-mode");
                const isDarkMode = body.classList.contains("dark-mode");
                localStorage.setItem("dark-mode", isDarkMode ? "enabled" : "disabled");
                darkModeToggle.textContent = isDarkMode ? "🔲" : "🔳";
            });
        });

        // Handle form submission
        function handleSignUp(event) {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const phone = document.getElementById("phone").value;
            const errorMessage = document.getElementById("errorMessage");

            // Basic validation
            if (password !== confirmPassword) {
                errorMessage.style.display = "block";
                errorMessage.textContent = "Passwords do not match";
                return;
            }

            // Create user profile
            const profile = {
                name: name,
                email: email,
                phone: phone,
                role: "Budget Manager",
                gender: "other",
                avatarStyle: "avataaars"
            };

            // Store in localStorage
            localStorage.setItem("profile", JSON.stringify(profile));
            localStorage.setItem("isAuthenticated", "true");
            localStorage.setItem("userEmail", email);

            // Show success animation
            document.querySelector('.signup-container').style.opacity = '0';
            document.querySelector('.signup-container').style.transform = 'translateY(-20px)';
            
            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 500);
        }

        // Check if user is already authenticated
        if (localStorage.getItem("isAuthenticated") === "true") {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>

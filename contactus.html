<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6551301135093849"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | SmartyBudget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color-light: #f8f9fa;
      --text-color-dark: #212529;
      --bg-color-dark: #121212;
      --text-color-light: #f8f9fa;
      --primary-color: #007bff;
      --secondary-color: #6c757d;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color-dark);
      color: var(--text-color-light);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.light-mode {
      background-color: var(--bg-color-light);
      color: var(--text-color-dark);
    }
    .contact-form-container {
      max-width: 600px;
      margin: 50px auto;
      background-color: var(--bg-color-dark);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
    }

    .contact-form-container.light-mode {
      background-color: var(--bg-color-light);
    }

    .contact-form input,
    .contact-form textarea,
    .contact-form button {
      margin-bottom: 15px;
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      font-size: 1rem;
    }

    .contact-form input,
    .contact-form textarea {
      border: 1px solid var(--secondary-color);
    }

    .contact-form button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      cursor: pointer;
    }

    .contact-form button:hover {
      background-color: #0056b3;
    }


  </style>
</head>
<body>

    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>SmartyBudget Navbar</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
      <style>
        :root {
          --bg-color-light: #f8f9fa;
          --text-color-dark: #212529;
          --bg-color-dark: #121212;
          --text-color-light: #f8f9fa;
          --primary-color: #007bff;
          --secondary-color: #6c757d;
        }
    
        body {
          font-family: Arial, sans-serif;
          background-color: var(--bg-color-light);
          color: var(--text-color-dark);
          transition: background-color 0.3s ease, color 0.3s ease;
        }
    
        body.dark-mode {
          background-color: var(--bg-color-dark);
          color: var(--text-color-light);
        }
    
        .navbar {
          background: linear-gradient(135deg, #2d3436, #212f3d);
          box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
        }
    
        .navbar-nav .nav-link {
          color: #ffffff !important;
          text-transform: uppercase;
          padding: 10px 20px;
          transition: transform 0.3s ease;
        }
    
        .navbar-nav .nav-link:hover {
          transform: scale(1.1);
          background-color: #1e2a3a;
        }
        .dark-mode-toggle {
          background-color: var(--secondary-color);
          color: white;
          border: none;
          border-radius: 50%;
          padding: 8px 12px;
          font-size: 1.2rem;
          cursor: pointer;
        }
    
        .dark-mode-toggle:hover {
          background-color: #2980b9;
        }
      </style>
    </head>
    <body>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="index.html">SmartyBudget</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="features.html">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item">
                        <button class="dark-mode-toggle" id="darkModeToggle">🔳</button>
                    </li>
                </ul>
            </div>
        </div>
      </nav>
  <div class="contact-form-container">
    <h2 class="text-center">Contact Us</h2>
    <form class="contact-form">
      <input type="text" id="contactName" placeholder="Your Name" required>
      <input type="email" id="contactEmail" placeholder="Your Email" required>
      <textarea id="contactMessage" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit" id="submitContactForm">Send Message</button>
    </form>
  </div>
  <footer class="bg-dark text-white text-center p-4 mt-5">
    <p>&copy; 2025 SmartyBudget. All Rights Reserved.</p>
    <a href="contact.html" class="text-white">Contact Us</a> | 
    <a href="terms.html" class="text-white">Terms & Conditions</a>
  </footer>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const darkModeToggle = document.getElementById("darkModeToggle");
      const body = document.body;
      const submitContactForm = document.getElementById("submitContactForm");
      const contactName = document.getElementById("contactName");
      const contactEmail = document.getElementById("contactEmail");
      const contactMessage = document.getElementById("contactMessage");
      submitContactForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const name = contactName.value.trim();
        const email = contactEmail.value.trim();
        const message = contactMessage.value.trim();

        if (name && email && message) {
          alert("Thank you for contacting us. We will get back to you soon!");
          contactName.value = "";
          contactEmail.value = "";
          contactMessage.value = "";
        } else {
          alert("Please fill out all fields.");
        }
      });
    });
        document.addEventListener("DOMContentLoaded", () => {
          const darkModeToggle = document.getElementById("darkModeToggle");
          const body = document.body;
    
          if (localStorage.getItem("dark-mode") === "enabled") {
            body.classList.add("dark-mode");
            darkModeToggle.textContent = "🔲";
          }
    
          darkModeToggle.addEventListener("click", () => {
            body.classList.toggle("dark-mode");
            const isDarkMode = body.classList.contains("dark-mode");
            localStorage.setItem("dark-mode", isDarkMode ? "enabled" : "disabled");
            darkModeToggle.textContent = isDarkMode ? "🔲" : "🔳";
          });
        });    

  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

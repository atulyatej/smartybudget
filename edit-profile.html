<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartyBudget Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color-light: #f8f9fa;
      --text-color-dark: #212529;
      --bg-color-dark: #121212;
      --text-color-light: #f8f9fa;
      --primary-color: #007bff;
      --secondary-color: #6c757d;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color-light);
      color: var(--text-color-dark);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-mode {
      background-color: var(--bg-color-dark);
      color: var(--text-color-light);
    }

    .navbar {
      background: linear-gradient(135deg, #2d3436, #212f3d);
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
    }

    .navbar-nav .nav-link {
      color: #ffffff !important;
      text-transform: uppercase;
      padding: 10px 20px;
      transition: transform 0.3s ease;
    }

    .navbar-nav .nav-link:hover {
      transform: scale(1.1);
      background-color: #1e2a3a;
    }

    /* Dark Mode Toggle Button */
    .dark-mode-toggle {
      background-color: var(--secondary-color);
      color: white;
      border: none;
      border-radius: 50%;
      padding: 8px 12px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .dark-mode-toggle:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="index.html">SmartyBudget</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="features.html">Features</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
                <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                <li class="nav-item">
                    <button class="dark-mode-toggle" id="darkModeToggle">🔳</button>
                </li>
            </ul>
        </div>
    </div>
  </nav>

  <!-- Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const darkModeToggle = document.getElementById("darkModeToggle");
      const body = document.body;

      if (localStorage.getItem("dark-mode") === "enabled") {
        body.classList.add("dark-mode");
        darkModeToggle.textContent = "🔲";
      }

      darkModeToggle.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        const isDarkMode = body.classList.contains("dark-mode");
        localStorage.setItem("dark-mode", isDarkMode ? "enabled" : "disabled");
        darkModeToggle.textContent = isDarkMode ? "🔲" : "🔳";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --bg-color-light: #f8f9fa;
            --text-color-dark: #212529;
            --bg-color-dark: #121212;
            --text-color-light: #f8f9fa;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color-light);
            color: var(--text-color-dark);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            border: 3px solid var(--primary-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: avatarGlow 2s infinite;
        }

        @keyframes avatarGlow {
            0% { box-shadow: 0 0 5px var(--primary-color); }
            50% { box-shadow: 0 0 20px var(--primary-color); }
            100% { box-shadow: 0 0 5px var(--primary-color); }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .dark-mode {
            background-color: var(--bg-color-dark);
            color: var(--text-color-light);
        }

        .dark-mode .card {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color-light);
        }

        .modal-content {
            background-color: var(--bg-color-light);
            color: var(--text-color-dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] .modal-content {
            background-color: var(--bg-color-dark);
            color: var(--text-color-light);
        }

        [data-bs-theme="dark"] .form-control,
        [data-bs-theme="dark"] .form-select {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-color-light);
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row">
            <!-- Profile Section -->
            <div class="col-lg-4">
                <div class="card mb-4">
                    <div class="card-body text-center">
                        <img id="profileAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=John" alt="Profile" class="profile-avatar">
                        <h3 id="userName" class="mb-2">Welcome, John!</h3>
                        <p id="userRole" class="text-muted mb-4">Budget Manager</p>
                        <div class="text-start mb-4">
                            <p><i class="fas fa-envelope"></i> <span id="userEmail">john@example.com</span></p>
                            <p><i class="fas fa-phone"></i> <span id="userPhone">+1234567890</span></p>
                        </div>
                        <button class="btn btn-primary w-100" onclick="openEditProfileModal()">
                            Edit Profile
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="profileForm">
                        <div class="text-center mb-4">
                            <img id="previewAvatar" src="" alt="Profile" class="profile-avatar mb-3">
                            <div class="mb-3">
                                <label class="form-label">Profile Picture</label>
                                <div class="d-flex gap-2 align-items-center">
                                    <input type="file" class="form-control" id="profilePicture" accept="image/*">
                                    <button type="button" class="btn btn-danger" onclick="deleteProfilePicture()">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                                <div class="form-text">Upload a profile picture or use an avatar</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Avatar Style</label>
                                <select class="form-select" id="avatarStyle">
                                    <option value="avataaars">Default Avatar</option>
                                    <option value="bottts">Robot Style</option>
                                    <option value="adventurer">Adventurer</option>
                                    <option value="adventurer-neutral">Neutral Style</option>
                                    <option value="big-smile">Big Smile</option>
                                    <option value="micah">Minimalist</option>
                                    <option value="personas">Professional</option>
                                    <option value="pixel-art">Pixel Art</option>
                                    <option value="fun-emoji">Fun Emoji</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea class="form-control" id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select class="form-select" id="editGender" required>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" id="editLocation" placeholder="City, Country">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="editPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <input type="text" class="form-control" id="editRole">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize profile data from localStorage or use defaults
        let profile = JSON.parse(localStorage.getItem('profile')) || {
            name: "John",
            email: "john@example.com",
            phone: "+1234567890",
            role: "Budget Manager",
            gender: "male",
            avatarStyle: "avataaars"
        };

        let profilePicture = null;

        // Update profile display
        function updateProfileDisplay() {
            document.getElementById('userName').textContent = `Welcome, ${profile.name}!`;
            document.getElementById('userRole').textContent = profile.role;
            document.getElementById('userEmail').textContent = profile.email;
            document.getElementById('userPhone').textContent = profile.phone;

            if (profile.profilePicture) {
                document.getElementById('profileAvatar').src = profile.profilePicture;
            } else {
                const avatarStyle = profile.avatarStyle || 'avataaars';
                document.getElementById('profileAvatar').src = 
                    `https://api.dicebear.com/7.x/${avatarStyle}/svg?seed=${profile.name}`;
            }
        }

        // Handle file upload
        document.getElementById('profilePicture').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profilePicture = e.target.result;
                    document.getElementById('previewAvatar').src = profilePicture;
                    document.getElementById('profileAvatar').src = profilePicture;
                };
                reader.readAsDataURL(file);
            }
        });

        // Delete profile picture
        function deleteProfilePicture() {
            profilePicture = null;
            document.getElementById('profilePicture').value = '';
            const avatarStyle = document.getElementById('avatarStyle').value;
            const avatarUrl = `https://api.dicebear.com/7.x/${avatarStyle}/svg?seed=${profile.name}`;
            document.getElementById('previewAvatar').src = avatarUrl;
            document.getElementById('profileAvatar').src = avatarUrl;
        }

        // Handle avatar style change
        document.getElementById('avatarStyle').addEventListener('change', function(e) {
            if (!profilePicture) {
                const style = e.target.value;
                const avatarUrl = `https://api.dicebear.com/7.x/${style}/svg?seed=${profile.name}`;
                document.getElementById('previewAvatar').src = avatarUrl;
                document.getElementById('profileAvatar').src = avatarUrl;
            }
        });

        // Open edit profile modal
        function openEditProfileModal() {
            document.getElementById('editName').value = profile.name;
            document.getElementById('editBio').value = profile.bio || '';
            document.getElementById('editGender').value = profile.gender || 'other';
            document.getElementById('editLocation').value = profile.location || '';
            document.getElementById('editEmail').value = profile.email;
            document.getElementById('editPhone').value = profile.phone;
            document.getElementById('editRole').value = profile.role;
            document.getElementById('avatarStyle').value = profile.avatarStyle || 'avataaars';

            if (profile.profilePicture) {
                document.getElementById('previewAvatar').src = profile.profilePicture;
            } else {
                const avatarStyle = profile.avatarStyle || 'avataaars';
                document.getElementById('previewAvatar').src = 
                    `https://api.dicebear.com/7.x/${avatarStyle}/svg?seed=${profile.name}`;
            }

            new bootstrap.Modal(document.getElementById('editProfileModal')).show();
        }

        // Update profile
        function updateProfile() {
            profile = {
                name: document.getElementById('editName').value,
                bio: document.getElementById('editBio').value,
                gender: document.getElementById('editGender').value,
                location: document.getElementById('editLocation').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                role: document.getElementById('editRole').value,
                avatarStyle: document.getElementById('avatarStyle').value,
                profilePicture: profilePicture
            };
            localStorage.setItem('profile', JSON.stringify(profile));
            updateProfileDisplay();
            bootstrap.Modal.getInstance(document.getElementById('editProfileModal')).hide();
        }

        // Initialize profile display when page loads
        document.addEventListener('DOMContentLoaded', () => {
            updateProfileDisplay();
        });
    </script>
    <footer class="bg-dark text-white text-center p-4 mt-5">
        <p>&copy; 2025 SmartyBudget. All Rights Reserved.</p>
        <a href="contact.html" class="text-white">Contact Us</a> | 
        <a href="terms.html" class="text-white">Terms & Conditions</a>
      </footer>
</body>
</html>
